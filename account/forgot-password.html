<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reset Password · Lahar</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" href="https://laharhub.com/uploads/images/logo_1770984823_.png" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .reset-wrap { min-height:60vh; display:flex; align-items:center; justify-content:center; padding:56px 18px; }
  .reset-card { width:100%; max-width:440px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-xl); padding:36px 32px; }
  .reset-card h1 { font-family:var(--font-display); font-size:var(--text-3xl); font-weight:700; margin:0 0 4px; letter-spacing:-.02em; }
  .reset-card p { font-size:var(--text-sm); color:var(--text-soft); margin:0 0 24px; line-height:1.5; }
  .reset-card .field { margin-bottom:16px; }
  .reset-card .btn-primary { width:100%; padding:14px; border:0; border-radius:var(--r-md); background:var(--brand); color:white; font-size:var(--text-md); font-weight:600; cursor:pointer; transition:background var(--t); }
  .reset-card .btn-primary:hover { background:var(--brand-hover); }
  .reset-card .back-link { display:block; text-align:center; margin-top:16px; font-size:var(--text-sm); color:var(--text-soft); text-decoration:none; }
  .reset-card .back-link:hover { color:var(--text); }
  .reset-card .success { display:none; text-align:center; padding:20px 0; }
  .reset-card .success svg { color:var(--ok); margin-bottom:12px; }
  .reset-card .success h2 { font-size:var(--text-xl); font-weight:600; margin:0 0 6px; }
  .reset-card .success p { font-size:var(--text-sm); color:var(--text-soft); margin:0; }
</style>
</head>
<body>
<div data-partial="header"></div>
<main>
  <div class="reset-wrap">
    <div class="reset-card">
      <div class="crumbs" style="margin-bottom:10px"><a href="/">Home</a><span class="sep">/</span><span>Reset Password</span></div>
      <h1>Reset password</h1>
      <p>Enter your email address and we'll send you a link to reset your password.</p>
      <form onsubmit="event.preventDefault();document.getElementById('sent').style.display='block';this.style.display='none'">
        <div class="field">
          <label>Email address</label>
          <input class="input" type="email" placeholder="you@yourbrand.com" required />
        </div>
        <button type="submit" class="btn-primary">Send reset link</button>
      </form>
      <div id="sent" class="success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
        <h2>Check your inbox</h2>
        <p>If an account exists with that email, you'll receive a password reset link shortly.</p>
      </div>
      <a href="/account/signin.html" class="back-link">← Back to sign in</a>
    </div>
  </div>
</main>
<div data-partial="footer"></div>
<div data-partial="tweaks"></div>
<script src="/js/partials.js"></script>
</body>
</html>
